
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient Survey Form</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

        // Aapka original Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyCYujgtEDDfvnJePhDKiKm9DkftoGAq9t8",
            authDomain: "benchtopinnovations12.firebaseapp.com",
            databaseURL: "https://benchtopinnovations12-default-rtdb.firebaseio.com",
            projectId: "benchtopinnovations12",
            storageBucket: "benchtopinnovations12.firebasestorage.app",
            messagingSenderId: "113274194106",
            appId: "1:113274194106:web:c2548c12c1ea20c5b69a83"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        document.getElementById('patientForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Saare naye fields ka data capture kiya ja raha hai
            const formData = {
                name: document.getElementById('name').value,
                age: document.getElementById('age').value,
                gender: document.getElementById('gender').value,
                contact: document.getElementById('contact').value,
                aadhaar: document.getElementById('aadhaar').value,
                religion: document.getElementById('religion').value,
                maritalStatus: document.getElementById('marital_status').value,
                address: document.getElementById('address').value,
                familyMembers: document.getElementById('family_members').value,
                socioeconomicStatus: document.getElementById('socioeconomic_status').value,
                preferredHealthCare: document.querySelector('input[name="health_care"]:checked')?.value || "",
                familyDetails: document.querySelector('input[name="family_details"]:checked')?.value || "",
                presentIllness: document.getElementById('present_illness').value,
                chronicIllness: document.querySelector('input[name="chronic_illness"]:checked')?.value || "",
                medicalTreatment: document.getElementById('medical_treatment').value,
                habbits: document.getElementById('habbits').value,
                otherComplaints: document.getElementById('other_complaints').value,
                treatmentFromKle: document.getElementById('treatment_kle').value,
                timestamp: new Date().toLocaleString()
            };

            // Firebase me push karne ka code (No changes)
            push(ref(db, 'patients/'), formData)
            .then(() => {
                alert("Data Successfully Saved!");
                document.getElementById('patientForm').reset();
            })
            .catch((error) => alert("Error: " + error.message));
        });
    </script>
</head>
<body class="bg-blue-50 py-8 px-4 font-sans text-gray-800">
    <div class="max-w-2xl mx-auto space-y-6">
        
        <!-- Header Section -->
        <div class="bg-white p-8 rounded-xl shadow-md border-t-8 border-blue-600">
            <h1 class="text-3xl font-bold text-gray-900 leading-tight">KLE HOMOEOPATHIC MEDICAL COLLEGE AND HOSPITAL BELAGAVI - PATIENT SERVEY FORM</h1>
        </div>

        <form id="patientForm" class="space-y-6">
            
            <!-- Text Inputs Section -->
            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">NAME</label>
                <input type="text" id="name" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition" required>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">AGE</label>
                <input type="text" id="age" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition" required>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">GENDER</label>
                <input type="text" id="gender" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition" required>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">CONTACT NUMBER</label>
                <input type="tel" id="contact" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition" required>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">AADHAR NUMBER</label>
                <input type="text" id="aadhaar" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">RELIGION</label>
                <input type="text" id="religion" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">MARITAL STATUS</label>
                <input type="text" id="marital_status" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">ADDRESS</label>
                <input type="text" id="address" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">No.OF FAMILY MEMBERS</label>
                <input type="text" id="family_members" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">SOCIOECONOMIC STATUS / MONTHLY INCOME</label>
                <input type="text" id="socioeconomic_status" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <!-- Radio Buttons Section -->
            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-4">PREFERED HEALTH CARE SYSTEM</label>
                <div class="space-y-4">
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="health_care" value="GOVERNMENT HOSPITAL" class="w-5 h-5 text-blue-600"><span>GOVERNMENT HOSPITAL</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="health_care" value="PRIVATE CLINIC" class="w-5 h-5 text-blue-600"><span>PRIVATE CLINIC</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="health_care" value="AYUSH / HOMOEOPATHIC" class="w-5 h-5 text-blue-600"><span>AYUSH / HOMOEOPATHIC</span></label>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-4">FAMILY DETAILS</label>
                <div class="space-y-4">
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="family_details" value="NUCLEAR" class="w-5 h-5 text-blue-600"><span>NUCLEAR</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="family_details" value="JOINT FAMILY" class="w-5 h-5 text-blue-600"><span>JOINT FAMILY</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="family_details" value="OLD AGE PEOPLE MORE" class="w-5 h-5 text-blue-600"><span>OLD AGE PEOPLE MORE</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="family_details" value="CHILDRENS MORE" class="w-5 h-5 text-blue-600"><span>CHILDRENS MORE</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="family_details" value="PREGNANT WOMEN" class="w-5 h-5 text-blue-600"><span>PREGNANT WOMEN</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="family_details" value="LACTATING MOTHERS" class="w-5 h-5 text-blue-600"><span>LACTATING MOTHERS</span></label>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">PRESENT H/O ILLNESS</label>
                <input type="text" id="present_illness" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-4">H/O CHRONIC ILLNESS</label>
                <div class="space-y-4">
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="DIABETES" class="w-5 h-5 text-blue-600"><span>DIABETES</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="HYPERTENSION" class="w-5 h-5 text-blue-600"><span>HYPERTENSION</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="ASTHMA" class="w-5 h-5 text-blue-600"><span>ASTHMA</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="ANEMIA" class="w-5 h-5 text-blue-600"><span>ANEMIA</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="SKIN DISEASE" class="w-5 h-5 text-blue-600"><span>SKIN DISEASE</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="BONE COMPLAINTS" class="w-5 h-5 text-blue-600"><span>BONE COMPLAINTS</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="NEUROLOGICAL DISEASE" class="w-5 h-5 text-blue-600"><span>NEUROLOGICAL DISEASE</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="PSYCHIATRIC DISEASE" class="w-5 h-5 text-blue-600"><span>PSYCHIATRIC DISEASE</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="CARDIAC DISEASES" class="w-5 h-5 text-blue-600"><span>CARDIAC DISEASES</span></label>
                    <label class="flex items-center space-x-3 cursor-pointer"><input type="radio" name="chronic_illness" value="OTHER" class="w-5 h-5 text-blue-600"><span>OTHER</span></label>
                </div>
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">H/O MEDICAL TREATMENT / MEDICATIONS</label>
                <input type="text" id="medical_treatment" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">HABBITS</label>
                <input type="text" id="habbits" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">OTHER COMPLAINTS</label>
                <input type="text" id="other_complaints" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <div class="bg-white p-6 rounded-xl shadow-md">
                <label class="block text-lg mb-2">H/O TREATMENT FROM KLE HOSPITAL FOR ANY FAMILY MEMBERS</label>
                <input type="text" id="treatment_kle" placeholder="Your answer" class="w-full p-2 border-b-2 border-gray-300 focus:outline-none focus:border-blue-600 transition">
            </div>

            <!-- Submit Button Section -->
            <div class="flex justify-between items-center bg-transparent mt-4">
                <button type="submit" class="bg-blue-600 text-white px-8 py-3 rounded-lg font-bold hover:bg-blue-700 transition shadow-md">
                    Submit
                </button>
                <button type="reset" class="text-blue-600 font-semibold hover:text-blue-800 transition">
                    Clear form
                </button>
            </div>
        </form>
    </div>
</body>
</html>
